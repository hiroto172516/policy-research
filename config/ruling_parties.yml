# =====================================================================
# 与党（分析対象）の会派指定
# ---------------------------------------------------------------------
# 「与党」は政局で変わるため名簿では固定しない（build_roster.py は会派を
# 公式表記のまま記録する）。ここで人間が現在の与党会派を宣言する。
#   ruling: yes  → 分析対象（メモ L63「与党議員全員」）
#   ruling: no   → 対象外（当面）
# ※ 会派名は data/roster.csv の party 列（公式サイト表記）に一致させる。
#    政局変化時はこのファイルだけ更新すれば対象集合が切り替わる。
# status: 要人間確定 / as_of: 2026-07-03
# =====================================================================

# 慣例的には自民・公明の連立が与党。ただし本ファイル作成時点の連立構成は
# 必ず一次情報で確認して yes/no を確定すること（推測で埋めない）。
parties:
  自民: {ruling: null}   # ← yes/no を記入
  公明: {ruling: null}
  維新: {ruling: null}
  国民: {ruling: null}
  立憲: {ruling: null}
  民主: {ruling: null}
  中道: {ruling: null}
  参政: {ruling: null}
  みらい: {ruling: null}
  共産: {ruling: null}
  れ新: {ruling: null}
  保守: {ruling: null}
  沖縄: {ruling: null}
  無所属: {ruling: null}
  無: {ruling: null}
